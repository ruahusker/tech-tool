<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tech Tool</title>
<style>
  :root{
    --bg:#f4f6f8; --surface:#ffffff; --surface-2:#f1f3f6; --surface-3:#e7ebf1;
    --border:#e2e6ec; --border-2:#d2d8e0;
    --text:#161a20; --text-2:#566072; --text-3:#8b94a3;
    --primary:#2f57e6; --primary-600:#2746c4; --primary-soft:#eaeefe;
    --danger:#dc2626; --danger-600:#b91c1c; --danger-soft:#fde8e8;
    --warn:#b45309; --warn-soft:#fdf0dc; --ok:#15803d; --ok-soft:#e3f5e9;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --shadow-sm:0 1px 2px rgba(20,30,55,.06),0 1px 3px rgba(20,30,55,.05);
    --shadow-md:0 4px 12px rgba(20,30,55,.08),0 2px 4px rgba(20,30,55,.05);
    --shadow-lg:0 14px 38px rgba(20,30,55,.18),0 4px 10px rgba(20,30,55,.08);
    --radius:12px; --sidebar:256px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,"Segoe UI",system-ui,Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
  svg.ic{display:block;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #app{display:flex;height:100vh}

  /* ---- sidebar ---- */
  .sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 18px 14px}
  .brand-logo{width:38px;height:38px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
  .brand-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .brand-sub{font-size:11.5px;color:var(--text-3);margin-top:1px}
  .nav{flex:1;overflow-y:auto;padding:4px 12px}
  .nav-label{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);padding:15px 10px 7px}
  .nav-item,.nav-cat{width:100%;display:flex;align-items:center;gap:11px;padding:9px 11px;border:none;background:none;color:var(--text-2);font:inherit;font-size:13.5px;font-weight:550;border-radius:9px;cursor:pointer;text-align:left;transition:background .12s,color .12s;margin-bottom:2px}
  .nav-item .lbl,.nav-cat .lbl{flex:1}
  .nav-item:hover,.nav-cat:hover{background:var(--surface-2);color:var(--text)}
  .nav-item.active,.nav-cat.active{background:var(--primary-soft);color:var(--primary)}
  .nav-count{font-size:11px;font-weight:700;color:var(--text-3);background:var(--surface-3);padding:1px 8px;border-radius:999px}
  .nav-cat.active .nav-count{background:#fff;color:var(--primary)}
  .sidebar-foot{border-top:1px solid var(--border);padding:13px 16px}
  .engine{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--text-2)}
  .engine .edot{width:8px;height:8px;border-radius:50%;background:var(--text-3);flex-shrink:0}
  .engine.ready .edot{background:var(--ok);box-shadow:0 0 0 3px var(--ok-soft)}
  .engine.err .edot{background:var(--danger);box-shadow:0 0 0 3px var(--danger-soft)}
  .machine{font-size:11.5px;color:var(--text-3);margin-top:7px;line-height:1.6}
  .foot-actions{display:flex;gap:8px;margin-top:12px}
  .foot-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:8px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font:inherit;font-size:12.5px;font-weight:600;border-radius:8px;cursor:pointer;transition:background .12s,color .12s,border-color .12s}
  .foot-btn .ic{width:15px;height:15px}
  .foot-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-2)}
  .foot-btn.danger:hover{background:var(--danger-soft);color:var(--danger-600);border-color:#f3c0c0}

  /* ---- content ---- */
  .content{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}
  .topbar{display:flex;align-items:center;gap:16px;padding:17px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .topbar-titles{flex:1;min-width:0}
  .topbar h1{margin:0;font-size:18px;font-weight:700;letter-spacing:-.015em}
  .topbar p{margin:2px 0 0;font-size:13px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  main{flex:1;overflow:hidden;display:flex;min-height:0}
  .view{flex:1;overflow-y:auto;padding:26px 28px;display:none}
  .view.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ---- cards ---- */
  .cat-group{margin-bottom:26px}
  .cat-group h2{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin:0 0 13px}
  #catPanel.roll{animation:roll .25s ease}
  @keyframes roll{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .card{animation:cardIn .28s ease backwards;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .14s,box-shadow .14s,transform .14s}
  @keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card:hover{border-color:var(--border-2);box-shadow:var(--shadow-md);transform:translateY(-2px)}
  .card:hover .card-arrow{color:var(--primary);transform:translateX(2px)}
  .card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .card-ico{width:40px;height:40px;flex-shrink:0;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center}
  .card-title{font-weight:650;font-size:14.5px;flex:1;line-height:1.25;letter-spacing:-.01em}
  .card-arrow{color:var(--text-3);transition:color .14s,transform .14s}
  .card-desc{font-size:13px;color:var(--text-2);line-height:1.5}
  .badges{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:650}
  .badge .ic{width:13px;height:13px;stroke-width:2.2}
  .badge.danger{background:var(--danger-soft);color:var(--danger-600)}
  .badge.admin{background:var(--warn-soft);color:var(--warn)}

  /* ---- buttons ---- */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:9px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid var(--border-2);background:var(--surface);color:var(--text);transition:background .12s,border-color .12s,box-shadow .12s,transform .04s;white-space:nowrap}
  .btn .ic{width:16px;height:16px}
  .btn:hover{background:var(--surface-2)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .btn.approve.safe{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:var(--shadow-sm)}
  .btn.approve.safe:hover{background:var(--primary-600);border-color:var(--primary-600)}
  .btn.approve{background:var(--danger);border-color:var(--danger);color:#fff}
  .btn.approve:hover{background:var(--danger-600);border-color:var(--danger-600)}
  .btn.ticket .ic{color:var(--text-2)}
  .tcount{font-size:11px;font-weight:700;background:var(--primary);color:#fff;border-radius:999px;padding:1px 7px}

  /* ---- setup overlay ---- */
  #setup{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  #setup.hidden{display:none}
  #setup .brand-logo{width:60px;height:60px;border-radius:16px}
  .spinner{width:34px;height:34px;border:3px solid var(--surface-3);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #setupTitle{font-size:18px;font-weight:700}
  #setupDetail{color:var(--text-2);font-size:13.5px;max-width:440px;text-align:center}
  #setupErr{display:none;color:var(--danger-600);font-family:var(--mono);font-size:12.5px;max-width:620px;white-space:pre-wrap;background:var(--danger-soft);border:1px solid #f3c0c0;padding:14px;border-radius:10px;text-align:left}

  /* ---- chat ---- */
  #chatView{display:none;flex-direction:column;height:100%;padding:0;overflow:hidden}
  #chatView.active{display:flex}
  #messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .chat-empty{margin:auto;max-width:520px;text-align:center;padding:20px;color:var(--text-2)}
  .chat-empty-ico{width:60px;height:60px;border-radius:16px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .chat-empty h2{margin:0 0 8px;font-size:19px;color:var(--text)}
  .chat-empty p{margin:0 auto 20px;font-size:13.5px;max-width:430px;line-height:1.55}
  .examples{display:flex;flex-direction:column;gap:9px;max-width:380px;margin:0 auto}
  .examples button{display:flex;align-items:center;gap:11px;padding:11px 14px;border:1px solid var(--border);background:var(--surface);border-radius:10px;font:inherit;font-size:13.5px;color:var(--text);cursor:pointer;text-align:left;transition:border-color .12s,box-shadow .12s,transform .1s}
  .examples button:hover{border-color:var(--primary);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
  .examples button .ic{color:var(--primary);width:18px;height:18px}
  .msg{max-width:740px;font-size:14px;line-height:1.55}
  .msg.user{align-self:flex-end;background:var(--primary);color:#fff;padding:11px 15px;border-radius:14px 14px 4px 14px;box-shadow:var(--shadow-sm)}
  .msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);padding:13px 16px;border-radius:14px 14px 14px 4px;box-shadow:var(--shadow-sm)}
  .msg.ai .flag{color:var(--danger);font-weight:700}
  .msg.ai code{font-family:var(--mono);font-size:12.5px;background:var(--surface-2);padding:1px 5px;border-radius:5px}
  .tool-run{align-self:flex-start;max-width:740px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .tool-run .head{padding:11px 14px;font-size:13.5px;display:flex;align-items:center;gap:9px;cursor:pointer}
  .tool-run .head .st{display:flex} .tool-run .head .st.ok{color:var(--ok)} .tool-run .head .st.warn{color:var(--warn)}
  .tool-run .head b{font-weight:650}
  .tool-run .head .exp{margin-left:auto;color:var(--text-3);display:flex;transition:transform .15s}
  .tool-run.open .head .exp{transform:rotate(90deg)}
  .tool-run pre{margin:0;padding:14px;background:#0f1320;color:#e6e9f2;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;max-height:320px;overflow:auto;white-space:pre-wrap;display:none}
  .tool-run.open pre{display:block}
  #inputBar{padding:16px 20px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:11px;align-items:flex-end}
  #chatInput{flex:1;background:var(--surface);border:1px solid var(--border-2);color:var(--text);border-radius:11px;padding:12px 15px;font-size:14px;font-family:inherit;resize:none;line-height:1.5;max-height:140px;transition:border-color .12s,box-shadow .12s}
  #chatInput:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .send{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0;border:none;border-radius:11px;background:var(--primary);color:#fff;cursor:pointer;box-shadow:var(--shadow-sm);transition:background .12s,transform .04s}
  .send .ic{width:20px;height:20px}
  .send:hover{background:var(--primary-600)} .send:active{transform:translateY(1px)} .send:disabled{opacity:.45;cursor:default}
  .thinking{align-self:flex-start;color:var(--text-3);font-size:13px;display:flex;align-items:center;gap:7px;padding:4px 2px}
  .dot{width:6px;height:6px;background:var(--primary);border-radius:50%;animation:pulse 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

  /* ---- modal ---- */
  #modal{position:fixed;inset:0;z-index:60;background:rgba(20,26,38,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:24px}
  #modal.show{display:flex;animation:fade .14s ease}
  .modal-box{background:var(--surface);border-radius:16px;width:560px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)}
  .mhead{padding:18px 22px;font-size:16px;font-weight:700;border-bottom:1px solid var(--border);flex-shrink:0;letter-spacing:-.01em}
  .mbody{padding:20px 22px;font-size:14px;overflow-y:auto;flex:1 1 auto;min-height:0}
  .mfoot{flex-shrink:0;padding:14px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);background:var(--surface-2)}
  .modal-sub{color:var(--text-2);margin-bottom:14px;font-size:13.5px;line-height:1.5}
  .reason{display:flex;gap:9px;align-items:flex-start;color:var(--warn);background:var(--warn-soft);border:1px solid #f0d9af;padding:11px 13px;border-radius:9px;margin-bottom:14px;font-size:13.5px;line-height:1.5}
  .reason .ic{color:var(--warn);margin-top:1px;flex-shrink:0;width:17px;height:17px}
  .reason.bad{color:var(--danger-600);background:var(--danger-soft);border-color:#f3c0c0}
  .reason.bad .ic{color:var(--danger-600)}
  .modal-box code{font-family:var(--mono);font-size:13px;background:var(--surface-2);padding:10px 12px;border-radius:8px;display:block;word-break:break-all;border:1px solid var(--border);color:var(--text)}
  pre.out{margin:0;background:#0f1320;color:#e6e9f2;padding:14px;border-radius:10px;font-family:var(--mono);font-size:12px;max-height:42vh;overflow:auto;white-space:pre-wrap}
  .use-when{font-size:13px;color:var(--text-2);margin-bottom:14px;line-height:1.5}
  .meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .meta{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2)}
  .meta .ic{width:14px;height:14px}
  .meta.time{color:var(--primary);background:var(--primary-soft);border-color:transparent}
  .meta.time.slow{color:var(--warn);background:var(--warn-soft)}
  .meta.admin{color:var(--warn);background:var(--warn-soft);border-color:transparent}
  .meta.danger{color:var(--danger-600);background:var(--danger-soft);border-color:transparent}
  .args-form label,.modal-box label{display:block;font-size:13px;margin:12px 0 5px;color:var(--text-2);font-weight:550}
  .modal-box input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border-2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit}
  .modal-box input[type=text]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .argchk{display:flex;align-items:center;gap:9px;margin:9px 0;font-size:13.5px}
  input[type=checkbox]{accent-color:var(--primary);width:16px;height:16px}

  /* ---- analysis ---- */
  .result-block{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .result-label{display:flex;align-items:center;gap:7px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--primary);font-weight:700;margin-bottom:11px}
  .analysis{font-size:13.5px;line-height:1.55}
  .an-sec{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:11px}
  .an-head{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
  .an-head .ic{width:14px;height:14px;color:var(--text-2)}
  .an-p{margin:6px 0} .an-list{margin:4px 0 2px;padding-left:20px} .an-list li{margin:5px 0} .an-body{white-space:normal}
  .analysis .er{color:var(--danger-600);font-weight:700}
  .analysis .wn{color:var(--warn);font-weight:700}
  .analysis .okk{color:var(--ok);font-weight:700}
  .analysis code{font-family:var(--mono);font-size:12px;background:var(--surface-3);padding:1px 6px;border-radius:5px}
  .an-sec.next-steps{background:var(--primary-soft);border-color:#cdd8fb}
  .an-sec.next-steps .an-head,.an-sec.next-steps .an-head .ic{color:var(--primary)}
  .an-sec.next-steps .an-list{padding-left:0;list-style:none;counter-reset:step}
  .an-sec.next-steps .an-list li{counter-increment:step;position:relative;padding:8px 10px 8px 38px;margin:8px 0;background:var(--surface);border:1px solid var(--border);border-radius:9px}
  .an-sec.next-steps .an-list li::before{content:counter(step);position:absolute;left:9px;top:8px;width:21px;height:21px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .toollink{display:inline-flex;align-items:center;gap:4px;cursor:pointer;color:var(--primary);background:var(--primary-soft);padding:1px 8px;border-radius:7px;font-weight:650;font-size:12.5px;white-space:nowrap}
  .toollink:hover{background:#dde4fd} .toollink .ic{width:12px;height:12px}

  /* ---- follow-up Q&A ---- */
  .followup{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .followup-thread{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
  .followup-thread:empty{display:none}
  .fq{align-self:flex-end;background:var(--primary);color:#fff;padding:8px 13px;border-radius:13px 13px 4px 13px;font-size:13.5px;max-width:85%;line-height:1.5}
  .fa{align-self:flex-start;background:var(--surface-2);border:1px solid var(--border);padding:10px 13px;border-radius:13px 13px 13px 4px;font-size:13.5px;max-width:92%;line-height:1.55}
  .fa .thinking{padding:0}
  .followup-bar{display:flex;gap:9px}
  .followup-bar input{flex:1;background:var(--surface);border:1px solid var(--border-2);border-radius:9px;padding:9px 12px;font-size:13.5px;font-family:inherit;color:var(--text)}
  .followup-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}

  /* ---- large files ---- */
  .lf-controls{display:flex;align-items:center;gap:12px;margin-bottom:9px;font-size:13px;color:var(--text-2)}
  .lf-controls label{display:flex;align-items:center;gap:6px;margin:0;font-weight:550;color:var(--text-2)}
  .lf-total{margin-left:auto;font-weight:600;color:var(--text)}
  .lf-wrap{max-height:42vh;overflow:auto;border:1px solid var(--border);border-radius:9px}
  .lf-table{width:100%;border-collapse:collapse;font-size:13px}
  .lf-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
  .lf-table tr:last-child td{border-bottom:none}
  .lf-size{text-align:right;color:var(--primary);font-weight:600;white-space:nowrap}
  .lf-path{font-family:var(--mono);font-size:12px;word-break:break-all;color:var(--text-2)}

  /* ---- toast ---- */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:12px 18px;border-radius:11px;box-shadow:var(--shadow-lg);z-index:70;font-size:13.5px;display:flex;align-items:center;gap:9px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:80vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast .ic{width:17px;height:17px} #toast .tok{color:#4ade80}

  /* ---- shutdown / uninstall overlay ---- */
  #bye{position:fixed;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
  #bye.hidden{display:none}
  .bye-ico{width:62px;height:62px;border-radius:16px;background:var(--ok-soft);color:var(--ok);display:flex;align-items:center;justify-content:center}
  #byeTitle{font-size:19px;font-weight:700}
  #byeDetail{color:var(--text-2);font-size:13.5px;max-width:440px;line-height:1.55}

  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:#c8cfd9;border-radius:7px;border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:#aeb7c4}
</style>
</head>
<body>
<div id="setup">
  <div class="brand-logo" data-icon="wrench" data-size="30"></div>
  <div class="spinner" id="spinner"></div>
  <div id="setupTitle">Starting Tech Tool</div>
  <div id="setupDetail">Preparing the local AI engine…</div>

</div>

  <aside class="sidebar">

<script>
const SESSION = "s" + Math.random().toString(36).slice(2);
let CATALOG = [];
let busy = false;

// ---------- icon system ----------
const ICONS = {
  wrench:'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
  grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/>',
  chat:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
  activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  cpu:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/>',
  zap:'<path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>',
  battery:'<rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2M6 11v2M9 11v2M12 11v2"/>',
  wifi:'<path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>',
  printer:'<path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/>',
  storage:'<path d="M22 12H2M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><path d="M6 16h.01M10 16h.01"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>',
  shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
  user:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  refresh:'<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M8 16H3v5"/>',
  play:'<path d="M7 4v16l13-8z" fill="currentColor" stroke="none"/>',
  eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  sparkles:'<path d="M12 3l1.6 4.6L18 9l-4.4 1.4L12 15l-1.6-4.6L6 9l4.4-1.4L12 3z"/><path d="M19 14l.6 1.8L21.5 16.5l-1.9.7L19 19l-.6-1.8L16.5 16.5l1.9-.7z"/>',
  save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
  copy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  clipboard:'<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 13h6M9 17h4"/>',
  search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  trash:'<path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  checkc:'<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
  alert:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/>',
  key:'<circle cx="7.5" cy="15.5" r="4.5"/><path d="m10.7 12.3 9.3-9.3M16 5l3 3M19.5 6.5l1.5-1.5"/>',
  clock:'<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  send:'<path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7z"/>',
  chevright:'<path d="m9 18 6-6-6-6"/>',
  external:'<path d="M15 3h6v6M10 14 21 3M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>',
  lightbulb:'<path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V17h6v-.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/>',
  compass:'<circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-2.9 6.4-6.4 2.9 2.9-6.4 6.4-2.9z"/>',
  power:'<path d="M12 2v10M18.36 6.64a9 9 0 1 1-12.73 0"/>',
  dot:'<circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>',
};
function icon(name, size, cls){ const p = ICONS[name] || ICONS.dot; const s = size || 18; return `<svg class="ic${cls ? " " + cls : ""}" width="${s}" height="${s}" viewBox="0 0 24 24" aria-hidden="true">${p}</svg>`; }
function blab(name, text){ return `${icon(name, 16)}<span>${text}</span>`; }
const CAT_ICON = { triage:"activity", sysinfo:"cpu", performance:"zap", hardware:"battery", network:"wifi", printing:"printer", storage:"storage", logs:"file", updates:"refresh", security:"shield", accounts:"user", repair:"wrench" };
function catIcon(c){ return CAT_ICON[c] || "wrench"; }

async function api(path, body) {
  const opt = body
    ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body), cache: "no-store" }
    : { cache: "no-store" };
  const url = body ? path : path + (path.includes("?") ? "&" : "?") + "_=" + Date.now();
  const r = await fetch(url, opt);
  return r.json();
}

// ---------- setup polling ----------
let pollFails = 0, pollCount = 0;
function setEngine(state){
  const e = document.querySelector(".engine"); if (!e) return;
  e.className = "engine" + (state === "ready" ? " ready" : state === "err" ? " err" : "");
  document.getElementById("engineState").textContent = state === "ready" ? "Engine ready" : state === "err" ? "Engine error" : "Starting…";
}
async function pollSetup() {
  pollCount++;
  try {
    const s = await api("/api/status");
    pollFails = 0;
    if (s.machine) document.getElementById("machineInfo").innerHTML =
      `${escapeHtml(s.machine.hostname)}<br>${escapeHtml(s.machine.platform)} · ${escapeHtml(s.machine.arch)} · ${s.machine.ramGB} GB RAM`;
    updateTicketBadge(s.activityCount || 0);
    if (s.error) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("setupTitle").textContent = "Setup failed";
      document.getElementById("setupDetail").textContent = "The local engine could not start:";
      const e = document.getElementById("setupErr"); e.style.display = "block"; e.textContent = s.error;
      setEngine("err");
      return;
    }
    if (s.ready) { document.getElementById("setup").classList.add("hidden"); setEngine("ready"); return; }
    setEngine("starting");
    if (s.detail) document.getElementById("setupDetail").textContent = s.detail;
    else if (pollCount > 12) document.getElementById("setupDetail").textContent =
      "Starting the local AI engine… first launch can take a minute while the model loads.";
  } catch (_) {
    pollFails++;
    if (pollFails > 8) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("setupTitle").textContent = "Can't reach the service";
      document.getElementById("setupDetail").textContent = "The Tech Tool service isn't responding.";
      const e = document.getElementById("setupErr"); e.style.display = "block";
      e.textContent = "Close this browser tab and the Tech Tool window, then double-click the launcher again. If it persists, another copy may already be running.";
      setEngine("err");
      return;
    }
  }
  setTimeout(pollSetup, 800);
}

// ---------- guided mode ----------
const CATEGORY_LABELS = {
  triage: "Start here", sysinfo: "System information", performance: "Speed & performance",
  network: "Network & internet", storage: "Disk space & health", logs: "Logs & crashes",
  updates: "Updates", security: "Security", accounts: "User accounts",
  printing: "Printing", hardware: "Hardware", repair: "Repair",
};
const GROUPS = [
  { key: "overview",    label: "Overview",         icon: "activity", cats: ["triage", "sysinfo"] },
  { key: "performance", label: "Performance",      icon: "zap",      cats: ["performance", "hardware"] },
  { key: "network",     label: "Network",          icon: "wifi",     cats: ["network", "printing"] },
  { key: "storage",     label: "Storage",          icon: "storage",  cats: ["storage"] },
  { key: "logs",        label: "Logs & Repair",    icon: "file",     cats: ["logs", "repair"] },
  { key: "security",    label: "Security & Users", icon: "shield",   cats: ["security", "accounts", "updates"] },
];

function scriptTitle(s) {
  if (s.title) return s.title;
  let n = s.path.split("/").pop().replace(/\.(ps1|sh)$/i, "").replace(/^Get-|^Invoke-/, "");
  n = n.replace(/[-_]+/g, " ").replace(/([a-z])([A-Z])/g, "$1 $2");
  return n.replace(/\b\w/g, (c) => c.toUpperCase());
}
function fmtTime(sec) {
  if (!sec || sec <= 10) return "a few seconds";
  if (sec < 60) return "about " + (Math.round(sec / 5) * 5) + " seconds";
  if (sec < 120) return "about a minute";
  return "about " + Math.round(sec / 60) + " minutes";
}
function estChip(sec) {
  const slow = sec && sec >= 60;
  return `<span class="meta time${slow ? " slow" : ""}">${icon("clock", 14)} ${fmtTime(sec)}${slow ? " · be patient" : ""}</span>`;
}

function cardEl(s) {
  const card = document.createElement("div");
  card.className = "card";
  const danger = s.destructive === true ? `<span class="badge danger">${icon("alert", 13)} Changes system</span>` : "";
  const admin = s.admin === true ? `<span class="badge admin">${icon("key", 13)} Needs admin</span>` : "";
  const badges = (danger || admin) ? `<div class="badges">${danger}${admin}</div>` : "";
  card.innerHTML = `
    <div class="card-top">
      <div class="card-ico">${icon(catIcon(s.category), 20)}</div>
      <div class="card-title">${escapeHtml(scriptTitle(s))}</div>
      <div class="card-arrow">${icon("chevright", 18)}</div>
    </div>
    <div class="card-desc">${escapeHtml(s.summary)}</div>${badges}`;
  card.onclick = () => (s.id.includes("find-large-files") ? openLargeFiles() : openScript(s));
  return card;
}

let activeGroup = null, CAT_BY = {};
async function buildGuided() {
  const data = await api("/api/catalog");
  CATALOG = data.scripts;
  const byCat = {};
  CATALOG.forEach((s) => { (byCat[s.category] = byCat[s.category] || []).push(s); });
  CAT_BY = byCat;

  const nav = document.getElementById("catNav");
  nav.innerHTML = "";
  const liveGroups = GROUPS.filter((g) => g.cats.some((c) => byCat[c]));
  liveGroups.forEach((g) => {
    const count = g.cats.reduce((n, c) => n + (byCat[c] ? byCat[c].length : 0), 0);
    const item = document.createElement("button");
    item.className = "nav-cat";
    item.dataset.key = g.key;
    item.innerHTML = `<span class="ico">${icon(g.icon, 18)}</span><span class="lbl">${g.label}</span><span class="nav-count">${count}</span>`;
    item.onclick = () => { setView("guided"); showGroup(g.key); };
    nav.appendChild(item);
  });
  document.getElementById("guidedView").innerHTML = `<div id="catPanel"></div>`;
  showGroup((liveGroups[0] || {}).key);
}

function showGroup(key) {
  if (!key) return;
  activeGroup = key;
  document.querySelectorAll(".nav-cat").forEach((p) => p.classList.toggle("active", p.dataset.key === key));
  const g = GROUPS.find((x) => x.key === key);
  const byCat = CAT_BY;
  const count = g.cats.reduce((n, c) => n + (byCat[c] ? byCat[c].length : 0), 0);
  if (document.getElementById("guidedView").classList.contains("active"))
    setTitle(g.label, `${count} tool${count !== 1 ? "s" : ""} · click any to run it and get an AI explanation`);
  const panel = document.getElementById("catPanel");
  panel.innerHTML = "";
  const liveCats = g.cats.filter((c) => byCat[c]);
  const showHeads = liveCats.length > 1;
  let delay = 0;
  liveCats.forEach((cat) => {
    const block = document.createElement("div");
    block.className = "cat-group";
    if (showHeads) block.innerHTML = `<h2>${icon(catIcon(cat), 15)}<span>${CATEGORY_LABELS[cat] || cat}</span></h2>`;
    const cards = document.createElement("div");
    cards.className = "cards";
    byCat[cat].forEach((s) => { const c = cardEl(s); c.style.animationDelay = (delay += 25) + "ms"; cards.appendChild(c); });
    block.appendChild(cards);
    panel.appendChild(block);
  });
  panel.classList.remove("roll"); void panel.offsetWidth; panel.classList.add("roll");
}

function openScript(s) {
  const optArgs = (s.args || []).filter((a) => !a.required);
  let form = `<div class="modal-sub">${escapeHtml(s.summary)}</div>`;
  form += `<div class="meta-row">${estChip(s.runtime_seconds)}${s.admin === true ? `<span class="meta admin">${icon("key", 14)} Needs admin</span>` : ""}${s.destructive === true ? `<span class="meta danger">${icon("alert", 14)} Changes system</span>` : ""}</div>`;
  if (s.use_when && s.use_when.length) form += `<div class="use-when"><b>Use when:</b> ${escapeHtml(s.use_when.join("; "))}.</div>`;
  if (s.destructive === true) form += `<div class="reason">${icon("alert", 17)}<span>This can change the system. It runs in preview (dry-run) first — nothing changes until you choose to apply.</span></div>`;
  if (optArgs.length) {
    form += `<div class="args-form">`;
    for (const a of optArgs) {
      const isFlag = a.name.startsWith("-") && !a.desc?.includes("value") && a.default === undefined && !["-OutFile","-Search","-Target","-Port","-Path","-Destination","-OutDir","-DaysInactive","-Hours","-Top","-MinSizeMB","-Exclude","-SampleSeconds","-EventHours","-User","-Days","--user","--dest","days"].includes(a.name);
      if (isFlag) {
        form += `<div class="argchk"><input type="checkbox" id="arg_${a.name}" data-arg="${a.name}"><label for="arg_${a.name}" style="margin:0">${escapeHtml(a.name)}${a.desc ? " — " + escapeHtml(a.desc) : ""}</label></div>`;
      } else {
        form += `<label>${escapeHtml(a.name)}${a.desc ? " — " + escapeHtml(a.desc) : ""}${a.default !== undefined ? " (default " + escapeHtml(String(a.default)) + ")" : ""}</label><input type="text" data-arg="${a.name}" data-valued="1" placeholder="${a.default !== undefined ? escapeHtml(String(a.default)) : ""}">`;
      }
    }
    form += `</div>`;
  }
  showModal(`${s.destructive ? "Preview" : "Run"}: ${scriptTitle(s)}`, form, [
    { label: blab("x", "Cancel"), cls: "btn", action: closeModal },
    { label: blab(s.destructive ? "eye" : "play", s.destructive ? "Preview" : "Run"), cls: "btn approve safe", action: () => runGuided(s) },
  ]);
}

function collectArgs() {
  const args = [];
  document.querySelectorAll("#modalBody [data-arg]").forEach((el) => {
    if (el.type === "checkbox") { if (el.checked) args.push(el.dataset.arg); }
    else if (el.value.trim()) { args.push(el.dataset.arg, el.value.trim()); }
  });
  return args;
}

async function runGuided(s) {
  const args = collectArgs();
  showModal(`Running ${scriptTitle(s)}…`, `<div style="display:flex;align-items:center;gap:12px"><div class="spinner" style="width:26px;height:26px;border-width:3px"></div><span style="color:var(--text-2)">This may take up to ${s.runtime_seconds || 30}s…</span></div>`, []);
  const res = await api("/api/run", { id: s.id, args });
  const isForce = args.join(" ").toLowerCase().match(/-force|--force|-repair|--repair|-clearqueue|-delete|--delete|--trash|--remove/);
  const footer = [{ label: blab("x", "Close"), cls: "btn", action: closeModal }];
  if (s.destructive === true && !isForce) {
    footer.unshift({ label: blab("alert", "Apply changes"), cls: "btn approve", action: () => applyGuided(s, args) });
  }
  showResult(`${scriptTitle(s)} — Result`, res.output || "(no output)", footer);
}

let curReport = { title: "", output: "", analysis: "", followups: [] };
function showResult(title, output, footerButtons) {
  const label = title.replace(/\s*—\s*Result$/, "").replace(/^Result:\s*/, "");
  curReport = { title: label, output: output, analysis: "", followups: [] };
  const body = `<pre class="out">${escapeHtml(output)}</pre><div id="analysisArea"></div>`;
  const footer = [
    { label: blab("sparkles", "Analyze with AI"), cls: "btn approve safe", action: () => runAnalysis(label, output) },
    { label: blab("download", "Save to USB"), cls: "btn", action: saveReport },
    ...(footerButtons || [{ label: blab("x", "Close"), cls: "btn", action: closeModal }]),
  ];
  showModalWide(title, body, footer);
}

async function runAnalysis(title, output) {
  const area = document.getElementById("analysisArea");
  if (!area) return;
  area.innerHTML = `<div class="result-block" style="display:flex;align-items:center;gap:10px;color:var(--text-2)"><div class="spinner" style="width:20px;height:20px;border-width:3px"></div> Analyzing with the local AI…</div>`;
  let data;
  try { data = await api("/api/analyze", { title, output }); }
  catch (e) { area.innerHTML = `<div class="result-block" style="color:var(--danger-600)">Analysis failed: ${escapeHtml(String(e))}</div>`; return; }
  if (data.error) { area.innerHTML = `<div class="result-block" style="color:var(--danger-600)">${escapeHtml(data.error)}</div>`; return; }
  curReport.analysis = data.analysis;
  curReport.followups = [];
  area.innerHTML = `<div class="result-block">
      <div class="result-label">${icon("sparkles", 14)} AI Analysis</div>
      <div class="analysis">${renderAnalysis(data.analysis)}</div>
      <div class="followup">
        <div class="result-label">${icon("chat", 14)} Ask a follow-up</div>
        <div class="followup-thread" id="followThread"></div>
        <div class="followup-bar">
          <input id="followInput" type="text" placeholder="Ask about this report… e.g. is this drive failing?" onkeydown="if(event.key==='Enter'){event.preventDefault();askFollowup()}">
          <button class="btn approve safe" onclick="askFollowup()">${blab("send", "Ask")}</button>
        </div>
      </div>
    </div>`;
  area.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function scrollFollow() { const b = document.querySelector("#modal .mbody"); if (b) b.scrollTop = b.scrollHeight; }
async function askFollowup() {
  const inp = document.getElementById("followInput");
  if (!inp) return;
  const q = inp.value.trim();
  if (!q) return;
  inp.value = "";
  const thread = document.getElementById("followThread");
  thread.insertAdjacentHTML("beforeend", `<div class="fq">${escapeHtml(q)}</div>`);
  const aid = "fa" + Date.now();
  thread.insertAdjacentHTML("beforeend", `<div class="fa" id="${aid}"><span class="thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>`);
  scrollFollow();
  let data;
  try { data = await api("/api/followup", { title: curReport.title, output: curReport.output, analysis: curReport.analysis, question: q, history: curReport.followups }); }
  catch (e) { document.getElementById(aid).innerHTML = `<span style="color:var(--danger-600)">Could not answer: ${escapeHtml(String(e))}</span>`; return; }
  const el = document.getElementById(aid);
  if (data.error) { el.innerHTML = `<span style="color:var(--danger-600)">${escapeHtml(data.error)}</span>`; return; }
  el.innerHTML = `<div class="analysis">${formatInline(data.answer).replace(/\n/g, "<br>")}</div>`;
  curReport.followups.push({ q, a: data.answer });
  scrollFollow();
}

function openToolById(id) {
  const s = CATALOG.find((x) => x.id === id);
  if (!s) return;
  if (s.id.includes("find-large-files")) openLargeFiles(); else openScript(s);
}
function toolIdForName(name) {
  const n = name.trim().toLowerCase().replace(/\s+[-–—].*$/, "").trim();
  for (const s of CATALOG) if ((s.title || "").toLowerCase() === n) return s.id;
  for (const s of CATALOG) {
    const f = s.path.split("/").pop().toLowerCase();
    if (f === n || f.replace(/\.(ps1|sh)$/, "") === n) return s.id;
  }
  for (const s of CATALOG) { const tl = (s.title || "").toLowerCase(); if (tl && n.startsWith(tl)) return s.id; }
  return null;
}
function formatInline(text) {
  let h = escapeHtml(text);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, (m, inner) => {
    const id = toolIdForName(inner);
    if (id) return '<span class="toollink" onclick="openToolById(\'' + id + '\')">' + inner + icon("external", 12) + '</span>';
    return "<strong>" + inner + "</strong>";
  });
  h = h.replace(/\b(ERRORS?|FAIL(?:ED|URE)?|CRITICAL|CORRUPT(?:ED)?|BugCheck|blue screen|dirty shutdown|not running|offline|unreachable|denied)\b/gi, '<span class="er">$1</span>');
  h = h.replace(/\b(WARNINGS?|WARN|LOW|AGING|STOPPED|PENDING|WEAK|HIGH|outdated|disabled)\b/gi, '<span class="wn">$1</span>');
  h = h.replace(/\b(OK|HEALTHY|VERIFIED|PASSED|NORMAL|GOOD|no issues|up to date)\b/gi, '<span class="okk">$1</span>');
  h = h.replace(/\[!\]/g, '<span class="er">[!]</span>');
  return h;
}
const SECTION_META = {
  "SUMMARY": { icon: "file", cls: "" }, "FINDINGS": { icon: "search", cls: "" },
  "LIKELY CAUSE": { icon: "compass", cls: "" }, "NEXT STEPS": { icon: "lightbulb", cls: "next-steps" },
  "ISSUE": { icon: "clipboard", cls: "" }, "ACTIONS TAKEN": { icon: "wrench", cls: "" },
  "RESOLUTION": { icon: "checkc", cls: "" }, "FOLLOW-UP": { icon: "lightbulb", cls: "next-steps" },
  "AUTO-GENERATED SUMMARY": { icon: "sparkles", cls: "" }, "CLIENT COMPUTER": { icon: "cpu", cls: "" },
};
function renderAnalysis(text) {
  const lines = String(text).split("\n");
  const secs = []; let cur = { head: null, lines: [] };
  const hdr = /^\s*(?:\d+\.\s*)?(AUTO-GENERATED SUMMARY|CLIENT COMPUTER|SUMMARY|FINDINGS|LIKELY CAUSE|NEXT STEPS|ISSUE|ACTIONS TAKEN|RESOLUTION|FOLLOW-?UP)\b\s*[:\-–]?\s*(.*)$/i;
  for (const line of lines) {
    const m = line.match(hdr);
    if (m) { if (cur.head || cur.lines.some((l) => l.trim())) secs.push(cur); cur = { head: m[1].toUpperCase(), lines: m[2].trim() ? [m[2]] : [] }; }
    else cur.lines.push(line);
  }
  if (cur.head || cur.lines.some((l) => l.trim())) secs.push(cur);
  if (!secs.length || (secs.length === 1 && !secs[0].head)) return `<div class="an-body">${formatInline(text).replace(/\n/g, "<br>")}</div>`;

  return secs.map((sec) => {
    const meta = sec.head ? (SECTION_META[sec.head] || { icon: "dot", cls: "" }) : null;
    let bodyHtml = ""; let listBuf = [];
    const flush = () => { if (listBuf.length) { bodyHtml += `<ol class="an-list">${listBuf.map((li) => `<li>${li}</li>`).join("")}</ol>`; listBuf = []; } };
    for (const raw of sec.lines) {
      const t = raw.trim();
      if (!t) continue;
      const li = t.match(/^(?:\d+[.)]\s*|[-•*]\s*)(.*)$/);
      if (li) listBuf.push(formatInline(li[1]));
      else { flush(); bodyHtml += `<p class="an-p">${formatInline(t)}</p>`; }
    }
    flush();
    const header = meta ? `<div class="an-head">${icon(meta.icon, 14)}<span>${sec.head}</span></div>` : "";
    return `<div class="an-sec ${meta ? meta.cls : ""}">${header}${bodyHtml}</div>`;
  }).join("");
}

// ---------- TeamDynamix hand-off (no credentials; uses your existing browser login) ----------
let tdxText = "";
function tdxTemplate() { try { return localStorage.getItem("tdxTicketUrl") || ""; } catch (_) { return ""; } }
function deriveTdxTemplate(url) {
  url = String(url || "").trim();
  if (!/^https?:\/\//i.test(url)) return "";
  if (/TicketID=\d+/i.test(url)) return url.replace(/(TicketID=)\d+/i, "$1{ID}");
  if (/\d/.test(url)) return url.replace(/\d+(?!.*\d)/, "{ID}"); // replace the last run of digits
  return "";
}
function resetTdxTemplate() { try { localStorage.removeItem("tdxTicketUrl"); } catch (_) {} showToast(`${icon("check", 16, "tok")} TeamDynamix address cleared — you'll set it again next time`, 3500); }

function sendToTdx(text) {
  tdxText = text || "";
  navigator.clipboard.writeText(tdxText).catch(() => {});
  const haveTmpl = !!tdxTemplate();
  const setup = haveTmpl ? "" : `
    <label>One-time setup — paste the web address of any TeamDynamix ticket</label>
    <input id="tdxUrl" type="text" placeholder="https://nusupport.nebraska.edu/...TicketID=1234567">
    <div style="color:var(--text-3);font-size:12px;margin:5px 0 4px">Open any ticket in TDX, copy its address from the browser bar, and paste it here. We'll remember the format so next time you only enter the number.</div>`;
  const body = `
    <div style="display:flex;gap:9px;align-items:center;color:var(--ok);background:var(--ok-soft);border:1px solid #bfe6cc;padding:11px 13px;border-radius:9px;margin-bottom:14px;font-size:13.5px">${icon("check", 17)}<span>Summary copied to your clipboard.</span></div>
    ${setup}
    <label>TeamDynamix ticket number</label>
    <input id="tdxNum" type="text" inputmode="numeric" placeholder="e.g. 1234567" onkeydown="if(event.key==='Enter'){event.preventDefault();openTdxTicket()}">
    <div style="color:var(--text-2);font-size:13px;margin-top:12px">It opens in your browser, where you're already signed in. Paste the summary into the ticket's comment box and save.</div>`;
  showModal("Send summary to TeamDynamix", body, [
    { label: blab("x", "Cancel"), cls: "btn", action: closeModal },
    { label: blab("external", "Open ticket"), cls: "btn approve safe", action: openTdxTicket },
  ]);
  setTimeout(() => { const f = document.getElementById(haveTmpl ? "tdxNum" : "tdxUrl"); if (f) f.focus(); }, 50);
}

async function openTdxTicket() {
  let tmpl = tdxTemplate();
  if (!tmpl) {
    const urlEl = document.getElementById("tdxUrl");
    tmpl = deriveTdxTemplate(urlEl ? urlEl.value : "");
    if (!tmpl) { showToast(`${icon("alert", 16)} Paste a valid ticket address first (it must contain the ticket number)`, 4500); return; }
    try { localStorage.setItem("tdxTicketUrl", tmpl); } catch (_) {}

  if (!num) { showToast(`${icon("alert", 16)} Enter the ticket number`, 3500); return; }
  try { await navigator.clipboard.writeText(tdxText); } catch (_) {}
  window.open(tmpl.replace("{ID}", num), "_blank", "noopener");
  const paste = /Mac|iPhone|iPad/.test(navigator.userAgent) ? "⌘V" : "Ctrl+V";
  showModal("Opened in TeamDynamix", `
    <div style="display:flex;gap:9px;align-items:center;color:var(--ok);background:var(--ok-soft);border:1px solid #bfe6cc;padding:11px 13px;border-radius:9px;margin-bottom:14px;font-size:13.5px">${icon("check", 17)}<span>Ticket #${escapeHtml(num)} opened in your browser, and the summary is on your clipboard.</span></div>
    <div style="color:var(--text-2);font-size:13.5px;line-height:1.6">Click into the ticket's <b>Comments</b>/update box and paste (<b>${paste}</b>), then save.<br><br>Address format wrong? <a href="#" onclick="resetTdxTemplate();return false" style="color:var(--primary);font-weight:600">Reset the TeamDynamix address</a> and try again.</div>`,
    [{ label: blab("check", "Done"), cls: "btn approve safe", action: closeModal }]);
}

function formatAi(text) {

function hideThinking() { if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; } }
function renderEvents(events) { (events || []).forEach(addToolRun); }

function handleAgentOut(out) {
  hideThinking();
  renderEvents(out.events);
  if (out.type === "reply") { addMsg("ai", formatAi(out.content)); setBusy(false); }
  else if (out.type === "confirm") { askApproval(out.call); }
}

function askApproval(call) {
  const isShell = call.name === "run_shell";

  showModal("Approve this action?",
    `<div class="reason bad">${icon("alert", 17)}<span>${escapeHtml(call.reason)}</span></div><div style="margin-bottom:6px">The assistant wants to run:</div><code>${escapeHtml(cmdText)}</code><div style="margin-top:12px;color:var(--text-2);font-size:13px">${isShell ? "This is a raw command." : "This script flag changes the system."} Administrator accounts are never removed.</div>`,
    [

      { label: blab("check", "Approve & run"), cls: "btn approve", action: () => { closeModal(); sendConfirm(true); } },
    ]);
}

async function sendChat() {
  const input = document.getElementById("chatInput");

  if (!text || busy) return;
  const empty = document.getElementById("chatEmpty"); if (empty) empty.remove();
  input.value = ""; input.style.height = "auto";

    if (out.error) { hideThinking(); addMsg("ai", `${icon("alert", 15)} ` + escapeHtml(out.error)); setBusy(false); return; }

let lfFiles = [];

async function scanLarge() {
  const p = document.getElementById("lfPath").value.trim();
  const min = document.getElementById("lfMin").value.trim() || "200";
  lfLastPath = p; lfLastMin = min;
  const res = document.getElementById("lfResult");
  res.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--text-2)"><div class="spinner" style="width:22px;height:22px;border-width:3px"></div> Scanning… large folders can take a minute.</div>`;
  let data;
  try { data = await api("/api/largefiles", { path: p, minMB: parseInt(min, 10) }); }
  catch (e) { res.innerHTML = `<div style="color:var(--danger-600)">Scan failed: ${escapeHtml(String(e))}</div>`; return; }
  if (data.error) { res.innerHTML = `<div style="color:var(--danger-600)">${escapeHtml(data.error)}</div>`; return; }
  lfFiles = data.files || [];
  if (!lfFiles.length) {
    res.innerHTML = `<div style="color:var(--text-2)">No files ≥ ${data.minMB} MB found under ${escapeHtml(data.root)} (scanned ${data.scanned} items).</div>`;
    return;
  }
  const rows = lfFiles.map((f, i) =>
    `<tr>
       <td><input type="checkbox" class="lfchk" data-i="${i}" onchange="updateLfTotal()"></td>
       <td class="lf-size">${f.sizeMB.toLocaleString()} MB</td>
       <td class="lf-path">${escapeHtml(f.path)}</td>
     </tr>`).join("");
  res.innerHTML = `
    <div class="lf-controls">
      <label><input type="checkbox" id="lfAll" onchange="toggleAllLf(this.checked)"> Select all</label>
      <span>${lfFiles.length} files${data.totalFound > lfFiles.length ? " (top " + lfFiles.length + " of " + data.totalFound + ")" : ""}</span>
      <span class="lf-total" id="lfTotal">0 selected</span>
    </div>
    <div class="lf-wrap"><table class="lf-table">${rows}</table></div>
    <button id="lfDelete" class="btn approve" style="margin-top:13px" disabled onclick="confirmDeleteLf()">${icon("trash", 16)}<span>Delete permanently</span></button>`;
}

function toggleAllLf(on) { document.querySelectorAll(".lfchk").forEach((c) => (c.checked = on)); updateLfTotal(); }
function selectedLf() { return Array.from(document.querySelectorAll(".lfchk")).filter((c) => c.checked).map((c) => lfFiles[+c.dataset.i]); }
function updateLfTotal() {
  const sel = selectedLf();
  const mb = sel.reduce((s, f) => s + f.sizeMB, 0);
  document.getElementById("lfTotal").textContent = `${sel.length} selected · ${mb.toLocaleString(undefined, { maximumFractionDigits: 0 })} MB`;
  document.getElementById("lfDelete").disabled = sel.length === 0;
}

function confirmDeleteLf() {
  const sel = selectedLf();
  if (!sel.length) return;
  const mb = sel.reduce((s, f) => s + f.sizeMB, 0);
  const list = sel.slice(0, 12).map((f) => escapeHtml(f.path)).join("<br>") + (sel.length > 12 ? `<br>…and ${sel.length - 12} more` : "");
  showModal("Permanently delete these files?",
    `<div class="reason bad">${icon("alert", 17)}<span>This CANNOT be undone. Files are deleted permanently — NOT moved to the Recycle Bin/Trash.</span></div>
     <div style="margin-bottom:8px">${sel.length} files · about ${mb.toLocaleString(undefined, { maximumFractionDigits: 0 })} MB will be freed:</div>
     <code style="max-height:30vh;overflow:auto">${list}</code>
     <div style="margin-top:10px;color:var(--text-2);font-size:13px">System and protected paths are refused automatically. A deletion log is saved to the USB drive.</div>`,
    [
      { label: blab("x", "Cancel"), cls: "btn", action: () => reopenLargeFiles() },
      { label: blab("trash", "Yes, delete permanently"), cls: "btn approve", action: () => doDeleteLf(sel) },
    ]);
}

async function doDeleteLf(sel) {
  showModal("Deleting…", `<div class="spinner" style="width:26px;height:26px;border-width:3px"></div>`, []);
  let data;
  try { data = await api("/api/deletefiles", { paths: sel.map((f) => f.path) }); }
  catch (e) { showModal("Error", `<div style="color:var(--danger-600)">${escapeHtml(String(e))}</div>`, [{ label: blab("x", "Close"), cls: "btn", action: closeModal }]); return; }
  const ok = data.results.filter((r) => r.ok).length;
  const failed = data.results.filter((r) => !r.ok);
  let html = `<div style="color:var(--ok);font-weight:600;margin-bottom:8px">Deleted ${ok} file(s), freed ${data.freedMB.toLocaleString(undefined, { maximumFractionDigits: 0 })} MB.</div>`;
  if (failed.length) html += `<div style="color:var(--warn);margin-bottom:6px">${failed.length} skipped/failed:</div><code style="max-height:30vh;overflow:auto">${failed.map((r) => escapeHtml(r.path.split(/[\\/]/).pop()) + " — " + escapeHtml(r.error)).join("<br>")}</code>`;
  html += `<div style="margin-top:10px;color:var(--text-3);font-size:12px">Log: ${escapeHtml(data.logFile || "")}</div>`;
  showModal("Done", html, [{ label: blab("search", "Scan again"), cls: "btn approve safe", action: () => openLargeFiles() }, { label: blab("x", "Close"), cls: "btn", action: closeModal }]);
}

  const foot = document.getElementById("modalFoot");
  foot.innerHTML = "";
  (buttons || []).forEach((b) => { const el = document.createElement("button"); el.className = b.cls; el.innerHTML = b.label; el.onclick = b.action; foot.appendChild(el); });
  document.getElementById("modal").classList.add("show");
}
let toastTimer = null;
function showToast(html, ms = 3000) {
  const t = document.getElementById("toast");
  t.innerHTML = html;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), ms);
}
function closeModal() { document.getElementById("modal").classList.remove("show"); }
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function setTitle(t, s) { document.getElementById("secTitle").textContent = t; document.getElementById("secSub").textContent = s; }
function setView(v) {
  document.querySelectorAll(".nav-item[data-view]").forEach((x) => x.classList.toggle("active", x.dataset.view === v));
  document.getElementById("guidedView").classList.toggle("active", v === "guided");
  document.getElementById("chatView").classList.toggle("active", v === "chat");
  document.getElementById("catNavLabel").style.display = v === "guided" ? "" : "none";
  document.getElementById("catNav").style.display = v === "guided" ? "" : "none";
  if (v === "chat") setTitle("AI Assistant", "Describe a problem — the assistant runs the right tool and explains the result.");
  else { const g = GROUPS.find((x) => x.key === activeGroup); if (g) showGroup(g.key); else setTitle("Guided Tools", "Pick a tool to run a guided diagnostic or fix."); }
}
function updateTicketBadge(n) {
  const btn = document.getElementById("ticketBtn");
  if (!btn) return;
  btn.innerHTML = `${icon("clipboard", 16)}<span>Ticket Summary</span>` + (n > 0 ? ` <span class="tcount">${n}</span>` : "");
}

// ---------- exit / uninstall ----------
let statusTimer = null;
function showBye(title, detail) {
  if (statusTimer) clearInterval(statusTimer);
  document.getElementById("byeIco").innerHTML = icon("checkc", 30);
  document.getElementById("byeTitle").textContent = title;
  document.getElementById("byeDetail").textContent = detail;
  document.getElementById("bye").classList.remove("hidden");
}
function confirmExit() {
  showModal("Exit Tech Tool?",
    `<div class="modal-sub">This stops the local Tech Tool service and AI engine. You can then close this tab and unplug the drive.</div>
     <div style="color:var(--text-2);font-size:13px">The AI model copied to this computer stays put so the next launch is fast. To remove it too, use <b>Uninstall</b> instead.</div>`,
    [
      { label: blab("x", "Cancel"), cls: "btn", action: closeModal },
      { label: blab("power", "Exit"), cls: "btn approve safe", action: doExit },
    ]);
}
async function doExit() {
  showModal("Shutting down…", `<div class="spinner" style="width:26px;height:26px;border-width:3px"></div>`, []);
  try { await api("/api/exit", {}); } catch (_) {}
  closeModal();
  showBye("Tech Tool has shut down", "You can close this browser tab and unplug the drive.");
}
function confirmUninstall() {
  showModal("Uninstall from this computer?",
    `<div class="reason bad">${icon("alert", 17)}<span>This removes the Tech Tool AI model and engine that were copied to THIS computer (in your home folder). The USB drive itself is not touched.</span></div>
     <div class="modal-sub">After removing, Tech Tool will close. Next time you plug the drive into a machine it re-copies what it needs.</div>`,
    [
      { label: blab("x", "Cancel"), cls: "btn", action: closeModal },
      { label: blab("trash", "Uninstall"), cls: "btn approve", action: doUninstall },
    ]);
}
async function doUninstall() {
  showModal("Removing local files…", `<div style="display:flex;align-items:center;gap:12px"><div class="spinner" style="width:26px;height:26px;border-width:3px"></div><span style="color:var(--text-2)">Removing the AI model and engine from this computer…</span></div>`, []);
  let data;
  try { data = await api("/api/uninstall", {}); } catch (_) { data = { ok: true }; }
  closeModal();
  if (data && data.error) { showToast(`${icon("alert", 16)} ${escapeHtml(data.error)}`, 5000); return; }
  const freed = data && data.freedMB ? `Removed ${data.freedMB.toLocaleString()} MB from this computer. ` : "";
  showBye("Uninstalled from this computer", `${freed}Safe to close this tab and unplug the drive.`);
}

// ---------- wiring ----------
document.querySelectorAll("[data-icon]").forEach((el) => { el.innerHTML = icon(el.dataset.icon, +(el.dataset.size || 18)); });
document.querySelectorAll(".nav-item[data-view]").forEach((t) => { t.onclick = () => setView(t.dataset.view); });
document.getElementById("sendBtn").onclick = sendChat;
const ci = document.getElementById("chatInput");
ci.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); } });
ci.addEventListener("input", () => { ci.style.height = "auto"; ci.style.height = Math.min(ci.scrollHeight, 140) + "px"; });
document.getElementById("messages").innerHTML = chatEmptyHtml();
updateTicketBadge(0);

statusTimer = setInterval(async () => { try { const s = await api("/api/status"); updateTicketBadge(s.activityCount || 0); } catch (_) {} }, 5000);

pollSetup();
buildGuided();
</script>
</body>
</html>
